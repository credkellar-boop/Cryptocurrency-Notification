name: "🧹 Automatic Code Cleanup"

on:
  workflow_run:
    workflows: ["High Vibration Heartbeat", "Monad-HFT-Node Self-Heal"] # Replace with your fix workflow names
    types: [completed]
    branches: [main]

jobs:
  prune-old-code:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Delete Temporary Workflows
        run: |
          # List the files you want to disappear once fixed
          rm -f .github/workflows/manual_heartbeat.yml
          rm -f .github/workflows/Sovereign-Auto-Fix.yml
          rm -f .github/workflows/Monad-HFT-Node-Self-Heal.yml
          
          git config --global user.name "Janitor Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "chore: auto-delete temporary fix workflows after success 🚀" || echo "Nothing to delete"
          git push
