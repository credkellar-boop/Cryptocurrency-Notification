name: "🧹 Notification Engine Cleanup"

on:
  workflow_run:
    workflows: ["Python application", "Pylint"] # Triggers when core CI passes
    types: [completed]
    branches: [main]

jobs:
  prune-old-code:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Delete Temporary CI Workflows
        run: |
          # This cleans up temporary setup workflows for the Notification engine
          rm -f .github/workflows/dependency-review.yml
          
          git config --global user.name "Janitor Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "chore: prune temporary CI workflows after successful build 🚀" || echo "Nothing to delete"
          git push
