name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # System Dependencies for potential voice/audio features
      - name: Install System Audio Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libasound2-dev python3-pyaudio

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint web3 python-telegram-bot python-dotenv
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Analysing the code
        run: |
          # Only checks files that actually exist to prevent "File Not Found" errors
          for file in main.py voice_control.py security_wipe.py; do
            if [ -f "$file" ]; then
              pylint --errors-only "$file"
            fi
          done
