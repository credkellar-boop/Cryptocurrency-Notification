version: 2
updates:
  # 1. This checks your Python dependencies (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # 2. This checks your GitHub Actions (fixes the Node.js warning you saw)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
